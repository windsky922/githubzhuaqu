name: Secrets 配置检查

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/secrets-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检查并验证 Secrets
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          required = [
              "GH_SEARCH_TOKEN",
              "KIMI_API_KEY",
              "KIMI_MODEL",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
          ]

          missing = [name for name in required if not os.getenv(name)]
          for name in required:
              print(f"{name}: {'已配置' if os.getenv(name) else '未配置'}")

          if missing:
              print("缺少必要 Secrets: " + ", ".join(missing))
              sys.exit(1)

          kimi_base_url = os.getenv("KIMI_BASE_URL") or "https://api.moonshot.cn/v1"
          print(f"KIMI_BASE_URL: {'已配置' if os.getenv('KIMI_BASE_URL') else '使用默认值'}")

          def request_json(request, timeout=30):
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  if len(body) > 1000:
                      body = body[:1000] + "..."
                  raise RuntimeError(f"HTTP {error.code}: {body}") from error

          github_request = urllib.request.Request(
              "https://api.github.com/rate_limit",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_SEARCH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-weekly-agent-secrets-check",
              },
          )
          github_data = request_json(github_request)
          print("GH_SEARCH_TOKEN: GitHub API 验证通过，剩余额度:", github_data.get("rate", {}).get("remaining"))

          kimi_url = kimi_base_url.rstrip("/")
          if not kimi_url.endswith("/chat/completions"):
              kimi_url += "/chat/completions"
          kimi_payload = {
              "model": os.environ["KIMI_MODEL"],
              "messages": [{"role": "user", "content": "请只回复 OK，用于 GitHub Actions Secrets 配置检查。"}],
              "temperature": 0,
              "max_tokens": 8,
          }
          kimi_request = urllib.request.Request(
              kimi_url,
              data=json.dumps(kimi_payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['KIMI_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          kimi_data = request_json(kimi_request, timeout=60)
          kimi_text = kimi_data.get("choices", [{}])[0].get("message", {}).get("content", "").strip()
          if not kimi_text:
              raise RuntimeError("Kimi API 返回为空")
          print("KIMI_API_KEY/KIMI_MODEL: Kimi API 验证通过")

          telegram_text = "GitHub Weekly Agent：Secrets 配置检查通过。"
          telegram_payload = urllib.parse.urlencode(
              {"chat_id": os.environ["TELEGRAM_CHAT_ID"], "text": telegram_text}
          ).encode("utf-8")
          telegram_request = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=telegram_payload,
              method="POST",
          )
          telegram_data = request_json(telegram_request)
          if not telegram_data.get("ok"):
              raise RuntimeError("Telegram API 返回失败")
          print("TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID: Telegram 推送验证通过")
          PY
