name: 公开归档修复发布

on:
  workflow_dispatch:
    inputs:
      confirm_public_archive_release:
        description: "确认仅发布现有公开归档投影（不会采集或外发）"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: github-public-archive-release
  cancel-in-progress: false

env:
  ARCHIVE_BRANCH: weekly-archive

jobs:
  publish:
    if: ${{ inputs.confirm_public_archive_release == true }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出 main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt

      - name: 安装前端依赖
        run: npm ci

      - name: 恢复既有公开归档数据
        run: |
          if git ls-remote --exit-code --heads origin "$ARCHIVE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$ARCHIVE_BRANCH"
            git checkout "origin/$ARCHIVE_BRANCH" -- reports data/raw data/runs data/selected data/trends || true
          else
            echo "归档分支 $ARCHIVE_BRANCH 不存在，将创建新的公开归档。"
          fi

      - name: 验证公开投影
        run: python scripts/publish_archive_branch.py --message "validation" --dry-run

      - name: 重建 Pages 静态文件
        run: python scripts/build_pages.py

      - name: 重建前端发布产物
        run: npm run build

      - name: 发布仅公开的归档投影
        run: >
          python scripts/publish_archive_branch.py
          --branch "$ARCHIVE_BRANCH"
          --message "fix: remediate public archive projection [skip ci]"

      - name: 验证远端公开归档 tree
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python scripts/audit_public_archive.py
          --branch "$ARCHIVE_BRANCH"
          --verify-latest
