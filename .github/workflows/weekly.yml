name: GitHub 每周热点项目智能体

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write

concurrency:
  group: github-weekly-agent
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 运行测试
        run: python -m unittest

      - name: 生成每周周报
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 生成周报归档页面
        run: python scripts/build_pages.py

      - name: 提交生成的归档文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/runs data/raw data/selected data/state data/trends docs/index.md docs/weekly
          if git diff --cached --quiet; then
            echo "没有需要提交的归档变更。"
          else
            git commit -m "chore: archive weekly github report [skip ci]"
            git push
          fi
