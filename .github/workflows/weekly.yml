name: GitHub 每周热点项目智能体

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "个性化 profile，例如 agent_development、python、java"
        required: false
        default: ""
      days_back:
        description: "回看天数"
        required: false
        default: "7"
      skip_main_delivery:
        description: "执行主流程时跳过内置推送，推荐保持 true，由后续步骤统一推送链接"
        required: false
        default: "true"
      send_link:
        description: "生成后是否推送 GitHub Pages 周报链接"
        required: false
        default: "true"
      plan_rag_maintenance:
        description: "是否根据 RAG 覆盖缺口创建维护计划任务"
        required: false
        default: "true"
      run_rag_evaluation:
        description: "是否执行一次 RAG 检索质量评估并写入 jobs"
        required: false
        default: "true"
      run_dev_context_index:
        description: "是否在生成 Pages 前轻量刷新开发上下文索引"
        required: false
        default: "true"
      run_agent_tasks:
        description: "是否执行优先级 1/2 的项目 Agent 只读任务"
        required: false
        default: "false"
      build_notification_candidates:
        description: "是否检测项目事件并构建待确认推送候选"
        required: false
        default: "true"
      send_event_notifications:
        description: "是否显式确认发送事件推送；默认关闭"
        required: false
        default: "false"
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write

concurrency:
  group: github-weekly-agent
  cancel-in-progress: false

env:
  ARCHIVE_BRANCH: weekly-archive

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装前端依赖
        run: npm ci

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 安全检查
        run: python scripts/security_check.py

      - name: 运行测试
        run: python -m unittest

      - name: 前端检查
        run: npm run lint && npm run test

      - name: 恢复归档分支历史数据
        run: |
          if git ls-remote --exit-code --heads origin "$ARCHIVE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$ARCHIVE_BRANCH"
            git checkout "origin/$ARCHIVE_BRANCH" -- data reports || true
          else
            echo "归档分支 $ARCHIVE_BRANCH 不存在，本次运行后会自动创建。"
          fi

      - name: 创建周报任务
        env:
          WORKFLOW_PROFILE: ${{ inputs.profile || vars.INTEREST_PROFILE }}
          WORKFLOW_DAYS_BACK: ${{ inputs.days_back || '7' }}
          WORKFLOW_SKIP_MAIN_DELIVERY: ${{ inputs.skip_main_delivery || 'true' }}
        run: >
          python scripts/create_planned_job.py
          --profile "$WORKFLOW_PROFILE"
          --days-back "$WORKFLOW_DAYS_BACK"
          --dry-run "$WORKFLOW_SKIP_MAIN_DELIVERY"
          --output .weekly-job.json

      - name: 执行周报任务
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          KIMI_TIMEOUT_SECONDS: ${{ vars.KIMI_TIMEOUT_SECONDS }}
          KIMI_MAX_RETRIES: ${{ vars.KIMI_MAX_RETRIES }}
          KIMI_RETRY_SECONDS: ${{ vars.KIMI_RETRY_SECONDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || secrets.REPORT_BASE_URL }}
          DELIVERY_CHANNELS: ${{ vars.DELIVERY_CHANNELS }}
        run: python scripts/run_planned_job.py --job-file .weekly-job.json

      - name: 创建 RAG 维护计划
        env:
          WORKFLOW_PLAN_RAG_MAINTENANCE: ${{ inputs.plan_rag_maintenance || 'true' }}
          RAG_MAINTENANCE_LIMIT: ${{ vars.RAG_MAINTENANCE_LIMIT || '10' }}
          RAG_MAINTENANCE_COVERAGE_LIMIT: ${{ vars.RAG_MAINTENANCE_COVERAGE_LIMIT || '100' }}
          RAG_MAINTENANCE_MIN_GAP_COUNT: ${{ vars.RAG_MAINTENANCE_MIN_GAP_COUNT || '1' }}
        run: |
          if [ "$WORKFLOW_PLAN_RAG_MAINTENANCE" != "true" ]; then
            echo "已跳过 RAG 维护计划。"
            exit 0
          fi
          python scripts/plan_rag_maintenance.py \
            --limit "$RAG_MAINTENANCE_LIMIT" \
            --coverage-limit "$RAG_MAINTENANCE_COVERAGE_LIMIT" \
            --min-gap-count "$RAG_MAINTENANCE_MIN_GAP_COUNT" \
            --requested-by "github_actions"

      - name: 执行 RAG 检索质量评估
        env:
          WORKFLOW_RUN_RAG_EVALUATION: ${{ inputs.run_rag_evaluation || 'true' }}
          RAG_EVALUATION_QUERIES: ${{ vars.RAG_EVALUATION_QUERIES }}
          RAG_EVALUATION_LANGUAGE: ${{ vars.RAG_EVALUATION_LANGUAGE }}
          RAG_EVALUATION_CATEGORY: ${{ vars.RAG_EVALUATION_CATEGORY }}
          RAG_EVALUATION_SOURCE: ${{ vars.RAG_EVALUATION_SOURCE }}
          RAG_EVALUATION_LIMIT: ${{ vars.RAG_EVALUATION_LIMIT || '8' }}
          RAG_EVALUATION_AUTO_BUILD: ${{ vars.RAG_EVALUATION_AUTO_BUILD || 'true' }}
        run: |
          if [ "$WORKFLOW_RUN_RAG_EVALUATION" != "true" ]; then
            echo "已跳过 RAG 检索质量评估。"
            exit 0
          fi
          python scripts/run_rag_search_evaluation.py \
            --queries "$RAG_EVALUATION_QUERIES" \
            --language "$RAG_EVALUATION_LANGUAGE" \
            --category "$RAG_EVALUATION_CATEGORY" \
            --source "$RAG_EVALUATION_SOURCE" \
            --limit "$RAG_EVALUATION_LIMIT" \
            --auto-build "$RAG_EVALUATION_AUTO_BUILD" \
            --requested-by "github_actions"

      - name: 刷新开发上下文索引
        env:
          WORKFLOW_RUN_DEV_CONTEXT_INDEX: ${{ inputs.run_dev_context_index || 'true' }}
        run: |
          if [ "$WORKFLOW_RUN_DEV_CONTEXT_INDEX" != "true" ]; then
            echo "已跳过开发上下文索引。"
            exit 0
          fi
          python scripts/plan_dev_context_index.py \
            --run-checks false \
            --replace false \
            --trigger-source "github_actions" \
            --requested-by "github_actions" \
            --output .dev-context-job.json
          python scripts/run_planned_job.py --job-file .dev-context-job.json

      - name: 执行项目 Agent 只读任务
        continue-on-error: true
        env:
          WORKFLOW_RUN_AGENT_TASKS: ${{ inputs.run_agent_tasks || 'false' }}
          AGENT_TASK_LIMIT: ${{ vars.AGENT_TASK_LIMIT || '3' }}
          AGENT_TASK_PRIORITY: ${{ vars.AGENT_TASK_PRIORITY || '2' }}
        run: |
          if [ "$WORKFLOW_RUN_AGENT_TASKS" != "true" ]; then
            echo "已跳过项目 Agent 任务执行。"
            exit 0
          fi
          python scripts/run_project_agent_tasks.py \
            --limit "$AGENT_TASK_LIMIT" \
            --priority "$AGENT_TASK_PRIORITY"

      - name: 检测订阅事件并构建候选
        continue-on-error: true
        env:
          WORKFLOW_BUILD_NOTIFICATION_CANDIDATES: ${{ inputs.build_notification_candidates || 'true' }}
          NOTIFICATION_EVENT_LIMIT: ${{ vars.NOTIFICATION_EVENT_LIMIT || '500' }}
        run: |
          if [ "$WORKFLOW_BUILD_NOTIFICATION_CANDIDATES" != "true" ]; then
            echo "已跳过订阅事件检测与候选构建。"
            exit 0
          fi
          python scripts/manage_notifications.py detect --limit "$NOTIFICATION_EVENT_LIMIT"
          python scripts/manage_notifications.py build --limit "$NOTIFICATION_EVENT_LIMIT"

      - name: 显式确认发送事件通知
        continue-on-error: true
        env:
          WORKFLOW_SEND_EVENT_NOTIFICATIONS: ${{ inputs.send_event_notifications || 'false' }}
          NOTIFICATION_DELIVERY_LIMIT: ${{ vars.NOTIFICATION_DELIVERY_LIMIT || '20' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || secrets.REPORT_BASE_URL }}
        run: |
          if [ "$WORKFLOW_SEND_EVENT_NOTIFICATIONS" != "true" ]; then
            echo "事件通知真实发送默认关闭，仅保留待确认候选。"
            exit 0
          fi
          python scripts/manage_notifications.py deliver-pending \
            --limit "$NOTIFICATION_DELIVERY_LIMIT" \
            --no-dry-run \
            --confirm-delivery \
            --requested-by "github_actions"

      - name: 生成周报归档页面
        run: python scripts/build_pages.py

      - name: 构建 React 项目研究工作台
        run: npm run build

      - name: 发布归档文件到独立分支
        run: >
          python scripts/publish_archive_branch.py
          --branch "$ARCHIVE_BRANCH"
          --message "chore: archive weekly github report [skip ci]"

      - name: 推送周报链接到 Telegram
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.send_link == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || secrets.REPORT_BASE_URL }}
          DELIVERY_CHANNELS: ${{ vars.DELIVERY_CHANNELS }}
        run: python scripts/send_report_link.py

      - name: 发布推送状态到独立分支
        run: >
          python scripts/publish_archive_branch.py
          --branch "$ARCHIVE_BRANCH"
          --message "chore: record delivery status [skip ci]"
