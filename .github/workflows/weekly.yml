name: GitHub 每周热点项目智能体

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write

concurrency:
  group: github-weekly-agent
  cancel-in-progress: false

env:
  ARCHIVE_BRANCH: weekly-archive

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 安全检查
        run: python scripts/security_check.py

      - name: 运行测试
        run: python -m unittest

      - name: 恢复归档分支历史数据
        run: |
          if git ls-remote --exit-code --heads origin "$ARCHIVE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$ARCHIVE_BRANCH"
            git checkout "origin/$ARCHIVE_BRANCH" -- data reports || true
          else
            echo "归档分支 $ARCHIVE_BRANCH 不存在，本次运行后会自动创建。"
          fi

      - name: 生成每周周报
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          KIMI_TIMEOUT_SECONDS: ${{ vars.KIMI_TIMEOUT_SECONDS }}
          KIMI_MAX_RETRIES: ${{ vars.KIMI_MAX_RETRIES }}
          KIMI_RETRY_SECONDS: ${{ vars.KIMI_RETRY_SECONDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || secrets.REPORT_BASE_URL }}
          DELIVERY_CHANNELS: ${{ vars.DELIVERY_CHANNELS }}
          INTEREST_PROFILE: ${{ vars.INTEREST_PROFILE }}
          SKIP_TELEGRAM_SEND: "true"
        run: python main.py

      - name: 生成周报归档页面
        run: python scripts/build_pages.py

      - name: 发布归档文件到独立分支
        run: python scripts/publish_archive_branch.py --branch "$ARCHIVE_BRANCH" --message "chore: archive weekly github report [skip ci]"

      - name: 推送周报链接到 Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || secrets.REPORT_BASE_URL }}
          DELIVERY_CHANNELS: ${{ vars.DELIVERY_CHANNELS }}
        run: python scripts/send_report_link.py

      - name: 发布推送状态到独立分支
        run: python scripts/publish_archive_branch.py --branch "$ARCHIVE_BRANCH" --message "chore: record delivery status [skip ci]"
