name: 提交质量检查

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 核心质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt

      - name: 安装前端依赖
        run: npm ci

      - name: 前端类型检查
        run: npm run lint

      - name: 前端单元测试
        run: npm run test

      - name: 重建前端发布产物
        run: npm run build

      - name: 检查前端发布产物一致性
        run: git diff --exit-code -- docs/app

      - name: Python 全量测试
        run: python -m unittest discover -q

      - name: 安全检查
        run: python scripts/security_check.py

      - name: 检查差异格式
        run: git diff --check

  e2e:
    name: Playwright mock 浏览器回归
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: 安装前端依赖
        run: npm ci

      - name: 重建前端发布产物
        run: npm run build

      - name: 安装 Chromium
        run: npx playwright install --with-deps chromium

      - name: 运行桌面与手机浏览器回归
        run: npm run test:e2e

      - name: 上传失败诊断产物
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_attempt }}
          path: output/playwright/
          if-no-files-found: ignore
          retention-days: 7

  playwright-real:
    name: Playwright 真实 FastAPI 回归
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt

      - name: 安装前端依赖
        run: npm ci

      - name: 重建前端发布产物
        run: npm run build

      - name: 安装 Chromium
        run: npx playwright install --with-deps chromium

      - name: 运行真实 FastAPI 与临时 SQLite 回归
        run: npm run test:e2e:real

      - name: 上传失败诊断产物
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-real-artifacts-${{ github.run_attempt }}
          path: output/playwright-real/
          if-no-files-found: ignore
          retention-days: 7
