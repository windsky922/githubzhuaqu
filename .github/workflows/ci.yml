name: 提交质量检查

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 核心质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt

      - name: 安装前端依赖
        run: npm ci

      - name: 前端类型检查
        run: npm run lint

      - name: 前端单元测试
        run: npm run test

      - name: 重建前端发布产物
        run: npm run build

      - name: 检查前端发布产物一致性
        run: git diff --exit-code -- docs/app

      - name: Python 全量测试
        run: python -m unittest discover -q

      - name: 安全检查
        run: python scripts/security_check.py

      - name: 检查差异格式
        run: git diff --check
